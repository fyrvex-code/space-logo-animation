<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Space Chat Logo Animation</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  overflow: hidden;
  background:
    radial-gradient(circle at 50% 50%, #17205a 0%, #070b1f 45%, #02030a 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, sans-serif;
  color: white;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(#1ad7ff 1px, transparent 1px),
    radial-gradient(#ff2bd6 1px, transparent 1px);
  background-size: 70px 70px, 130px 130px, 200px 200px;
  opacity: 0.35;
  animation: starsMove 18s linear infinite;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: linear-gradient(
    120deg,
    transparent 0%,
    #1ad7ff18 50%,
    transparent 100%
  );
  animation: globalLight 5s ease-in-out infinite;
}

@keyframes starsMove {
  to { transform: translateY(160px); }
}

@keyframes globalLight {
  0%, 100% { transform: translateX(-100%); opacity: 0; }
  50% { transform: translateX(100%); opacity: 1; }
}

.scene {
  position: relative;
  width: 480px;
  height: 480px;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 1000px;
}

.scene::before {
  content: "";
  position: absolute;
  width: 430px;
  height: 430px;
  border-radius: 50%;
  background: radial-gradient(circle, #1ad7ff33, #b832ff22, transparent 70%);
  filter: blur(45px);
  animation: bgPulse 3s ease-in-out infinite;
}

@keyframes bgPulse {
  0%, 100% { transform: scale(.9); opacity: .55; }
  50% { transform: scale(1.18); opacity: 1; }
}

.logo {
  width: 340px;
  position: relative;
  z-index: 20;
  opacity: 0;
  animation:
    appear 1.4s ease forwards 1.3s,
    float 4s ease-in-out infinite 2.8s,
    glow 2.2s ease-in-out infinite 2.8s,
    rotate3d 7s ease-in-out infinite 2.8s,
    microShake 5s infinite 3s;
}

@keyframes appear {
  0% {
    opacity: 0;
    transform: scale(.4) rotate(-15deg);
    filter: blur(20px);
  }
  70% {
    opacity: 1;
    transform: scale(1.12) rotate(2deg);
    filter:
      blur(0)
      drop-shadow(0 0 40px #1ad7ff)
      drop-shadow(0 0 80px #ff2bd6);
  }
  100% {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes float {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-16px) scale(1.035); }
}

@keyframes glow {
  0%, 100% {
    filter:
      drop-shadow(0 0 25px #1ad7ff)
      drop-shadow(0 0 45px #9b5cff);
  }
  50% {
    filter:
      drop-shadow(0 0 55px #1ad7ff)
      drop-shadow(0 0 90px #ff2bd6)
      drop-shadow(0 0 130px #ffffff55);
  }
}

@keyframes rotate3d {
  0%, 100% { transform: rotateY(0deg) rotateX(0deg); }
  25% { transform: rotateY(7deg) rotateX(3deg); }
  50% { transform: rotateY(0deg) rotateX(-3deg); }
  75% { transform: rotateY(-7deg) rotateX(3deg); }
}

@keyframes microShake {
  0%, 96%, 100% { translate: 0 0; }
  97% { translate: 1px -1px; }
  98% { translate: -1px 1px; }
  99% { translate: 1px 1px; }
}

.energy-line {
  position: absolute;
  width: 330px;
  height: 235px;
  border: 5px solid transparent;
  border-top-color: #1ad7ff;
  border-right-color: #b832ff;
  border-radius: 55% 50% 48% 55%;
  filter:
    drop-shadow(0 0 18px #1ad7ff)
    drop-shadow(0 0 35px #ff2bd6);
  transform: rotate(-8deg) scale(.65);
  opacity: 0;
  z-index: 10;
  animation: drawLine 2s ease forwards, hideLine 1s ease forwards 2.3s;
}

@keyframes drawLine {
  0% {
    opacity: 0;
    clip-path: inset(0 100% 0 0);
  }
  25% { opacity: 1; }
  100% {
    opacity: 1;
    clip-path: inset(0 0 0 0);
    transform: rotate(-8deg) scale(1);
  }
}

@keyframes hideLine {
  to { opacity: 0; transform: rotate(-8deg) scale(1.15); }
}

.ring,
.ring2,
.ring3 {
  position: absolute;
  border-radius: 50%;
  z-index: 1;
}

.ring {
  width: 460px;
  height: 460px;
  background: conic-gradient(transparent, #1ad7ff66, transparent, #ff2bd666, transparent);
  filter: blur(35px);
  animation: spin 7s linear infinite;
  opacity: .45;
}

.ring2 {
  width: 390px;
  height: 390px;
  border: 2px solid #1ad7ff55;
  animation: spinReverse 9s linear infinite, ringPulse 2.4s ease-in-out infinite;
}

.ring3 {
  width: 300px;
  height: 300px;
  border: 1px dashed #ff2bd699;
  animation: spin 14s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes spinReverse {
  to { transform: rotate(-360deg); }
}

@keyframes ringPulse {
  0%, 100% { scale: .96; opacity: .35; }
  50% { scale: 1.06; opacity: .9; }
}

.scan {
  position: absolute;
  width: 420px;
  height: 5px;
  background: linear-gradient(90deg, transparent, #1ad7ff, white, #ff2bd6, transparent);
  filter: blur(2px);
  z-index: 30;
  opacity: 0;
  animation: scanMove 4s ease-in-out infinite 3s;
}

@keyframes scanMove {
  0%, 100% { opacity: 0; transform: translateY(-190px); }
  20%, 70% { opacity: .9; }
  50% { transform: translateY(190px); }
}

.flash {
  position: absolute;
  width: 380px;
  height: 380px;
  border-radius: 50%;
  background: radial-gradient(circle, white, #1ad7ff55, transparent 70%);
  opacity: 0;
  z-index: 25;
  animation: flash 4.5s ease-in-out infinite 2.5s;
}

@keyframes flash {
  0%, 85%, 100% { opacity: 0; scale: .7; }
  90% { opacity: .45; scale: 1.1; }
}

.beam {
  position: absolute;
  width: 600px;
  height: 80px;
  background: linear-gradient(90deg, transparent, #1ad7ff33, transparent);
  transform: rotate(-25deg);
  filter: blur(18px);
  animation: beamMove 5s ease-in-out infinite;
}

@keyframes beamMove {
  0%, 100% { translate: -420px -140px; opacity: 0; }
  50% { translate: 420px 140px; opacity: .8; }
}

.comet {
  position: absolute;
  width: 140px;
  height: 3px;
  background: linear-gradient(90deg, white, #1ad7ff, transparent);
  border-radius: 999px;
  filter: drop-shadow(0 0 12px #1ad7ff);
  animation: cometFly 3.5s linear infinite;
}

.comet.one { top: 80px; left: -120px; animation-delay: 0s; }
.comet.two { top: 320px; left: -160px; animation-delay: 1.2s; }
.comet.three { top: 180px; left: -180px; animation-delay: 2.1s; }

@keyframes cometFly {
  from { transform: translateX(0) translateY(0) rotate(-18deg); opacity: 0; }
  15% { opacity: 1; }
  to { transform: translateX(760px) translateY(170px) rotate(-18deg); opacity: 0; }
}

.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: #1ad7ff;
  border-radius: 50%;
  box-shadow: 0 0 16px #1ad7ff;
  animation: particleMove 4s ease-in-out infinite;
}

.p1 { left: 70px; top: 100px; animation-delay: .1s; }
.p2 { right: 60px; top: 120px; animation-delay: .4s; background: #ff2bd6; }
.p3 { left: 100px; bottom: 90px; animation-delay: .8s; }
.p4 { right: 110px; bottom: 80px; animation-delay: 1.1s; background: #b832ff; }
.p5 { left: 230px; top: 40px; animation-delay: 1.5s; }

@keyframes particleMove {
  0%, 100% { transform: translate(0,0) scale(.7); opacity: .3; }
  50% { transform: translate(20px,-25px) scale(1.4); opacity: 1; }
}

.title {
  position: absolute;
  bottom: 5px;
  z-index: 40;
  font-size: 24px;
  font-weight: 900;
  letter-spacing: 6px;
  opacity: 0;
  animation:
    titleShow 1s ease forwards 3s,
    titleGlow 2s ease-in-out infinite 4s;
}

@keyframes titleShow {
  to { opacity: 1; transform: translateY(0); }
  from { opacity: 0; transform: translateY(20px); }
}

@keyframes titleGlow {
  0%, 100% { text-shadow: 0 0 18px #1ad7ff; }
  50% { text-shadow: 0 0 35px #ff2bd6, 0 0 60px #1ad7ff; }
}

.scene:hover .logo {
  animation:
    hoverLogo .8s ease forwards,
    glow .8s ease-in-out infinite;
}

@keyframes hoverLogo {
  to {
    transform: scale(1.12) rotate(2deg);
  }
}

@media (max-width: 520px) {
  .scene {
    width: 330px;
    height: 330px;
  }

  .logo {
    width: 250px;
  }

  .ring {
    width: 330px;
    height: 330px;
  }

  .ring2 {
    width: 290px;
    height: 290px;
  }

  .ring3 {
    width: 230px;
    height: 230px;
  }

  .energy-line {
    width: 250px;
    height: 180px;
  }

  .title {
    font-size: 17px;
    letter-spacing: 4px;
  }
}
</style>
</head>

<body>
  <div class="scene">
    <div class="beam"></div>

    <div class="ring"></div>
    <div class="ring2"></div>
    <div class="ring3"></div>

    <div class="comet one"></div>
    <div class="comet two"></div>
    <div class="comet three"></div>

    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
    <div class="particle p4"></div>
    <div class="particle p5"></div>

    <div class="energy-line"></div>
    <div class="flash"></div>
    <div class="scan"></div>

    <img src="logo.png" alt="Space Chat Logo" class="logo" />

    <div class="title">SPACE CHAT</div>
  </div>
</body>
</html>
